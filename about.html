<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Gulshan Kumar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Animated background elements */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(111, 66, 193, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s infinite alternate ease-in-out;
        }

        .glow:nth-child(2) {
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            right: -10%;
            animation-delay: 2s;
        }

        @keyframes pulse {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.2) translate(-20px, 20px); opacity: 1; }
        }

        /* Glassmorphism Card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 4rem 5rem;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(30px);
            opacity: 0;
            animation: slide-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-width: 600px;
        }

        @keyframes slide-up {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(58, 123, 213, 0.3);
        }

        p {
            font-size: 1.15rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 1.5rem;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: #00d2ff;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="contact.html">Contact</a>
    </nav>
    <div class="glow"></div>
    <div class="glow"></div>
    
    <div class="card">
        <h1>About Me</h1>
        <p>Hi, I'm Gulshan Kumar. I am passionate about creating beautiful and functional web applications. I love exploring new technologies and pushing the boundaries of web design.</p>
    </div>
</body>
</html>
