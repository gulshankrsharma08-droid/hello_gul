<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Animated background elements */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(111, 66, 193, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s infinite alternate ease-in-out;
        }

        .glow:nth-child(2) {
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            right: -10%;
            animation-delay: 2s;
        }

        @keyframes pulse {
            0% { transform: scale(0.8) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.2) translate(-20px, 20px); opacity: 1; }
        }

        /* Navigation */
        nav {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: #00d2ff;
        }

        /* Gallery Layout */
        .gallery-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 1000px;
            margin-top: 6rem;
            height: 75vh;
            overflow-y: auto;
            padding-right: 15px; /* for scrollbar */
        }

        /* Custom Scrollbar */
        .gallery-container::-webkit-scrollbar {
            width: 8px;
        }
        .gallery-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .gallery-container::-webkit-scrollbar-thumb {
            background: rgba(0, 210, 255, 0.5);
            border-radius: 10px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0 0 2rem 0;
            letter-spacing: -1.5px;
            text-align: center;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.2) 0%, rgba(58, 123, 213, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3);
            z-index: 2;
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        .gallery-content {
            position: relative;
            z-index: 1;
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        /* Colorful Placeholders */
        .item-1 { background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); }
        .item-2 { background: linear-gradient(120deg, #f6d365 0%, #fda085 100%); }
        .item-3 { background: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%); }
        .item-4 { background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); }
        .item-5 { background: linear-gradient(to top, #cfd9df 0%, #e2ebf0 100%); }
        .item-6 { background: linear-gradient(to right, #b8cbb8 0%, #b8cbb8 0%, #b465da 0%, #cf6cc9 33%, #ee609c 66%, #ee609c 100%); }

        .item-5 .gallery-content { color: #333; text-shadow: none; }

        @keyframes stagger-in {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .gallery-item {
            animation: stagger-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        
        /* Stagger delays */
        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }

    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
    <div class="glow"></div>
    <div class="glow"></div>
    
    <div class="gallery-container">
        <h1>Creative Works</h1>
        <div class="grid">
            <div class="gallery-item item-1">
                <span class="gallery-content">Project Alpha</span>
            </div>
            <div class="gallery-item item-2">
                <span class="gallery-content">Sunset Vibes</span>
            </div>
            <div class="gallery-item item-3">
                <span class="gallery-content">Nature Tech</span>
            </div>
            <div class="gallery-item item-4">
                <span class="gallery-content">Ocean Blue</span>
            </div>
            <div class="gallery-item item-5">
                <span class="gallery-content">Minimalist</span>
            </div>
            <div class="gallery-item item-6">
                <span class="gallery-content">Cyber Neon</span>
            </div>
        </div>
    </div>
</body>
</html>
